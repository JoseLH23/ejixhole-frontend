name: Release - Panel administrativo

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: node scripts/validate-release.mjs
      - run: npm run check
      - name: Empaquetar y generar evidencia
        run: |
          node scripts/validate-release.mjs --evidence
          tar -czf release-evidence/ejixhole-frontend-dist.tar.gz dist
          sha256sum release-evidence/* > release-evidence/SHA256SUMS
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-release-evidence-${{ github.ref_name }}
          path: release-evidence/
          retention-days: 90
      - name: Crear GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release-evidence/* --verify-tag --generate-notes --title "EjiXhole Panel ${GITHUB_REF_NAME}"
